<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        body { font-family: sans-serif; padding: 50px; background-color: #f4f4f4; }

        div { 
            max-width: 600px; 
            max-height: 400px; 
            overflow: auto; 
            border: 1px solid #ccc;
        }

        table { 
            border-collapse: collapse; 
            width: 100%; 
            background: white;
        }

        th, td { 
            padding: 15px 25px; 
            border: 1px solid #ddd; 
            text-align: center; 
            white-space: nowrap; 
        }

        th, td:first-child { 
            background-color: #add8e6; 
            font-weight: bold; 
        }

        thead th { 
            position: sticky; 
            top: 0; 
        }

        td:first-child { 
            position: sticky; 
            left: 0; 
        }

        thead th:first-child { 
            left: 0; 
            z-index: 1;
        }

        tbody tr:nth-child(even) { 
            background-color: #f9f9f9; 
        }
    </style>
</head>
<body>
    <div>
        <table>
            <thead>
                <tr>
                    <th></th> <th>Header 1</th>
                    <th>Header 2</th>
                    <th>Header 3</th>
                    <th>Header 4</th>
                    <th>Header 5</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>Line 1</td><td>23</td><td>123</td><td>43</td><td>12</td><td>76</td></tr>
                <tr><td>Line 2</td><td>23</td><td>123</td><td>43</td><td>12</td><td>76</td></tr>
                <tr><td>Line 3</td><td>34</td><td>63</td><td>25</td><td>7</td><td>23</td></tr>
                <tr><td>Line 4</td><td>23</td><td>23</td><td>23</td><td>23</td><td>23</td></tr>
                <tr><td>Line 5</td><td>23</td><td>23</td><td>23</td><td>23</td><td>23</td></tr>
                <tr><td>Line 6</td><td>23</td><td>23</td><td>23</td><td>23</td><td>23</td></tr>
                <tr><td>Line 7</td><td>23</td><td>23</td><td>23</td><td>23</td><td>23</td></tr>
                <tr><td>Line 8</td><td>23</td><td>23</td><td>23</td><td>23</td><td>23</td></tr>
                <tr><td>Line 9</td><td>23</td><td>23</td><td>23</td><td>23</td><td>23</td></tr>
                <tr><td>Line 10</td><td>23</td><td>23</td><td>23</td><td>23</td><td>23</td></tr>
            </tbody>
        </table>
    </div>

</body>
</html>
